# Reference Alertmanager config for routing alerts fired by alert_rules.yml.
# Not required to run Prometheus/the exporter — alerts still evaluate and
# show up in Prometheus's UI without this. Add this only if you want alerts
# actually delivered somewhere (webhook, email, Slack, etc).
#
# Run alongside Prometheus, e.g.:
#   alertmanager --config.file=alertmanager.yml
# Prometheus is already configured (see prometheus.yml) to send alerts to
# localhost:9093, Alertmanager's default port.

global:
  resolve_timeout: 5m

route:
  receiver: "default"
  group_by: ["alertname", "host"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: "default"
    # Replace with a real receiver, e.g.:
    # webhook_configs:
    #   - url: "http://localhost:5001/alerts"
    # email_configs:
    #   - to: "you@example.com"
    #     from: "alertmanager@example.com"
    #     smarthost: "smtp.example.com:587"
